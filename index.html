<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;
  background:black;
  color:white;
}

/* =========================
   INTRO VIDEO
========================= */

#intro-video{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:black;

  z-index:99999;

  display:flex;

  justify-content:center;
  align-items:center;

  overflow:hidden;

  transition:1s;
}

#intro-video video{

  width:100%;
  height:100%;

  object-fit:contain;

  background:black;
}

/* =========================
   VIDEO BACKGROUND
========================= */

.video-background{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:-3;
}

.video-background video{

  position:absolute;

  width:100%;
  height:100%;

  object-fit:cover;

  opacity:0;

  animation:videoFade 48s infinite;

  filter:
  brightness(1)
  contrast(1.1)
  saturate(1.1);
}

/* VIDEO BERGANTIAN */

.video-background video:nth-child(1){
  animation-delay:0s;
}

.video-background video:nth-child(2){
  animation-delay:8s;
}

.video-background video:nth-child(3){
  animation-delay:16s;
}

.video-background video:nth-child(4){
  animation-delay:24s;
}

.video-background video:nth-child(5){
  animation-delay:32s;
}

.video-background video:nth-child(6){
  animation-delay:40s;
}

/* ANIMASI */

@keyframes videoFade{

  0%{
    opacity:0;
    transform:scale(1);
  }

  5%{
    opacity:1;
  }

  15%{
    opacity:1;
    transform:scale(1.03);
  }

  20%{
    opacity:0;
  }

  100%{
    opacity:0;
  }

}

/* OVERLAY */

.overlay{

  position:fixed;

  width:100%;
  height:100%;

  top:0;
  left:0;

  background:
  linear-gradient(
  rgba(0,0,0,0.25),
  rgba(0,0,0,0.45)
  );

  z-index:-2;
}

/* =========================
   CONTAINER
========================= */

.container{

  width:100%;
  max-width:1200px;

  margin:auto;

  padding:20px;
}

/* =========================
   CARD
========================= */

.hero-card{

  margin-top:30px;

  background:rgba(255,255,255,0.08);

  border-radius:30px;

  padding:30px;

  text-align:center;

  backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,0.15);

  box-shadow:
  0 10px 40px rgba(0,0,0,0.5);

}

/* =========================
   LOGO
========================= */

.logo{

  width:170px;

  margin-bottom:20px;

  animation:float 3s ease-in-out infinite;
}

@keyframes float{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-8px);
  }

}

/* =========================
   TEXT
========================= */

h1{

  font-size:34px;

  margin-bottom:15px;
}

.desc{

  line-height:1.8;

  margin-bottom:20px;
}

marquee{

  color:#00ffae;

  font-weight:bold;

  margin-bottom:20px;
}

/* =========================
   MENU
========================= */

.menu-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-top:30px;
}

.menu-card{

  text-decoration:none;

  color:white;

  padding:25px 20px;

  border-radius:22px;

  transition:0.3s;

  background:
  linear-gradient(
  145deg,
  rgba(0,255,140,0.35),
  rgba(0,120,255,0.28)
  );

  backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,0.12);

  box-shadow:
  0 8px 18px rgba(0,0,0,0.35);
}

.menu-card:hover{

  transform:
  translateY(-6px)
  scale(1.03);
}

.menu-icon{

  font-size:40px;

  margin-bottom:15px;

  display:block;
}

.menu-title{

  font-size:20px;

  font-weight:600;

  margin-bottom:8px;
}

/* =========================
   JAM
========================= */

#clock{

  position:fixed;

  top:15px;
  right:15px;

  background:rgba(255,255,255,0.15);

  padding:10px 15px;

  border-radius:15px;

  backdrop-filter:blur(10px);

  font-weight:bold;

  z-index:999;
}

/* =========================
   TOMBOL MUSIK
========================= */

.music-btn{

  position:fixed;

  left:20px;
  bottom:20px;

  z-index:999;

  border:none;

  background:#00c97f;

  color:white;

  padding:15px 18px;

  border-radius:50px;

  font-size:16px;

  cursor:pointer;

  box-shadow:
  0 0 20px rgba(0,255,170,0.5);
}

/* =========================
   WA FLOAT
========================= */

.wa-float{

  position:fixed;

  right:20px;
  bottom:20px;

  width:65px;
  height:65px;

  background:#25D366;

  color:white;

  border-radius:50%;

  text-align:center;

  line-height:65px;

  font-size:34px;

  text-decoration:none;

  z-index:999;
}

/* =========================
   FOOTER
========================= */

footer{

  text-align:center;

  margin-top:40px;

  padding:30px 10px;

  color:#ddd;
}

/* =========================
   RESPONSIVE HP
========================= */

@media(max-width:768px){

  h1{
    font-size:26px;
  }

  .logo{
    width:140px;
  }

  .hero-card{
    padding:22px;
  }

}

</style>

<script>

/* JAM */

function updateClock(){

  const now = new Date();

  const jam =
  now.toLocaleTimeString('id-ID');

  document.getElementById('clock')
  .innerHTML = '🕒 ' + jam;
}

setInterval(updateClock,1000);

updateClock();

/* INTRO VIDEO */

const intro =
document.getElementById('intro-video');

const introPlayer =
document.getElementById('introPlayer');

introPlayer.onended = function(){

  intro.style.opacity = "0";

  setTimeout(()=>{

    intro.style.display = "none";

  },1000);

};

/* MUSIK */

function playMusic(){

  const music =
  document.getElementById("bgMusic");

  music.play();
